name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Reject tracked generated artifacts
        run: scripts/audit_no_generated_files.sh
      - uses: leanprover/lean-action@v1
      - name: Check forbidden Lean tokens
        run: scripts/audit_no_forbidden_lean_tokens.sh LeanLCAExactChallenge audit
      - name: Build Lean audit dependencies
        run: scripts/build_lean_audit_dependencies.sh
      - name: Check Lean audit declarations
        run: |
          lake env lean audit/RequiredDeclarations.lean
          lake env lean audit/ProductSuccessDeclarations.lean
          lake env lean audit/OriginalFourTaskCompletionDeclarations.lean
      - name: Run external source audit
        run: PYTHONDONTWRITEBYTECODE=1 python3 audit/external_audit.py --root .
      - name: Check whitespace
        run: git diff --check
