name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Reject tracked generated artifacts
        run: scripts/audit_no_generated_files.sh
      - uses: leanprover/lean-action@v1
      - name: Check forbidden Lean tokens
        run: scripts/audit_no_forbidden_lean_tokens.sh LeanLCAExactChallenge
      - name: Check whitespace
        run: git diff --check
