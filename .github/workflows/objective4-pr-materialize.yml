name: Materialize Objective 4 PR source

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.objective4-upload/**'

permissions:
  contents: write

jobs:
  materialize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'objective4-smart-truncation-20260723'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: objective4-smart-truncation-20260723
      - name: Reconstruct verified source files
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .objective4-upload ]]; then
            echo 'Source already materialized.'
            exit 0
          fi
          cat .objective4-upload/missing.tar.gz.b64.part-* | base64 -d > /tmp/objective4-missing.tar.gz
          echo '36f0e7afb3ca6fbe2811768db5d9d7c3821716ef3a18fba30263d7e32b46004e  /tmp/objective4-missing.tar.gz' | sha256sum -c -
          tar -xzf /tmp/objective4-missing.tar.gz
          echo '4abe3cf7febd51453b49bd62c08ee203a34ed1152a606303eabba6f45c8958ef  LeanLCAExactChallenge/Infinity/QuotientAlexanderWhitney.lean' | sha256sum -c -
          echo 'e06661578e31ec135ed53c22c23e00334892a099e693ce2e266e0a217cad268d  LeanLCAExactChallenge/Infinity/QuotientAlexanderWhitneyCoassociativity.lean' | sha256sum -c -
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -r .objective4-upload
          if [[ -f .github/workflows/objective4-materialize.yml ]]; then
            git rm .github/workflows/objective4-materialize.yml
          fi
          git add LeanLCAExactChallenge/Infinity/QuotientAlexanderWhitney.lean
          git add LeanLCAExactChallenge/Infinity/QuotientAlexanderWhitneyCoassociativity.lean
          git commit -m 'Materialize Alexander-Whitney source files'
          git push origin HEAD:objective4-smart-truncation-20260723
